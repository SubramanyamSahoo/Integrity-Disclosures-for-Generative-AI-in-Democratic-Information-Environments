<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Alignment map</title><desc id="desc">Failure layers mapped to disclosure dimensions D1a through D7.</desc>
  <defs><linearGradient id="cell2" x1="0" x2="1"><stop stop-color="#70e59a" stop-opacity=".85"/><stop offset="1" stop-color="#67e8f9" stop-opacity=".75"/></linearGradient><linearGradient id="cell1" x1="0" x2="1"><stop stop-color="#facc15" stop-opacity=".75"/><stop offset="1" stop-color="#ff8bd1" stop-opacity=".55"/></linearGradient></defs>
  <rect width="1200" height="520" rx="28" fill="#0b1224"/><g font-family="Inter, Arial, sans-serif"><text x="60" y="58" fill="#fff" font-size="28" font-weight="900">Failure layer → disclosure dimension</text><text x="60" y="88" fill="#aebbd4" font-size="16">Bright cells indicate primary alignment; dim cells indicate partial or disclosure-insufficient coverage.</text><g transform="translate(280 125)" font-weight="800" font-size="15" fill="#67e8f9"><text x="30" y="0">D1a</text><text x="130" y="0">D1b</text><text x="230" y="0">D2</text><text x="330" y="0">D3</text><text x="430" y="0">D4</text><text x="530" y="0">D5</text><text x="630" y="0">D6</text><text x="730" y="0">D7</text></g><g transform="translate(60 150)"><text x="0" y="58" fill="#fff" font-size="18" font-weight="800">Epistemic foundations</text><text x="0" y="88" fill="#aebbd4" font-size="14">F1–F4</text><text x="0" y="178" fill="#fff" font-size="18" font-weight="800">Contextual integrity</text><text x="0" y="208" fill="#aebbd4" font-size="14">F5, F7, F10</text><text x="0" y="298" fill="#fff" font-size="18" font-weight="800">Structural manipulation</text><text x="0" y="328" fill="#aebbd4" font-size="14">F8, F9, compound</text></g><g transform="translate(280 150)"><g opacity=".18" fill="#fff"><rect x="0" y="0" width="820" height="90" rx="18"/><rect x="0" y="120" width="820" height="90" rx="18"/><rect x="0" y="240" width="820" height="90" rx="18"/></g><rect x="0" y="0" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="100" y="0" width="90" height="90" rx="18" fill="url(#cell2)"/><rect x="200" y="0" width="90" height="90" rx="18" fill="url(#cell2)"/><rect x="300" y="0" width="90" height="90" rx="18" fill="url(#cell2)"/><rect x="500" y="0" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="600" y="0" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="400" y="120" width="90" height="90" rx="18" fill="url(#cell2)"/><rect x="600" y="120" width="90" height="90" rx="18" fill="url(#cell2)"/><rect x="200" y="120" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="0" y="240" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="100" y="240" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="500" y="240" width="90" height="90" rx="18" fill="url(#cell1)"/><rect x="700" y="240" width="90" height="90" rx="18" fill="url(#cell1)"/><g fill="#07101d" font-weight="900" font-size="18" text-anchor="middle"><text x="45" y="55">input</text><text x="145" y="55">origin</text><text x="245" y="55">uncert.</text><text x="345" y="55">time</text><text x="545" y="55">redress</text><text x="645" y="55">sources</text><text x="445" y="175">place</text><text x="645" y="175">context</text><text x="245" y="175">caveat</text><text x="45" y="295">supply</text><text x="145" y="295">labels</text><text x="545" y="295">challenge</text><text x="745" y="295">labor</text></g></g></g>
</svg>
