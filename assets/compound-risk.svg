<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Compound risk diagram</title><desc id="desc">Layered visualization of compound disclosure risk in civic contexts.</desc>
  <defs><linearGradient id="risk" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#67e8f9"/><stop offset=".5" stop-color="#facc15"/><stop offset="1" stop-color="#ff8bd1"/></linearGradient><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="4"/></filter></defs>
  <rect width="720" height="520" rx="28" fill="#0b1224"/><g transform="translate(360 260)" font-family="Inter, Arial, sans-serif"><circle r="182" fill="none" stroke="#67e8f9" stroke-width="4" stroke-dasharray="10 12" opacity=".95"/><circle r="132" fill="none" stroke="#facc15" stroke-width="4" stroke-dasharray="10 12" opacity=".95"/><circle r="82" fill="none" stroke="#ff8bd1" stroke-width="4" stroke-dasharray="10 12" opacity=".95"/><circle r="42" fill="url(#risk)" opacity=".9" filter="url(#soft)"/><circle r="36" fill="#07101d" stroke="#fff" stroke-opacity=".35"/><text y="-4" fill="#fff" font-size="18" font-weight="900" text-anchor="middle">CIVIC</text><text y="18" fill="#fff" font-size="18" font-weight="900" text-anchor="middle">DECISION</text><g font-size="16" font-weight="800"><rect x="-294" y="-172" width="188" height="48" rx="18" fill="rgba(103,232,249,.16)" stroke="#67e8f9"/><text x="-200" y="-141" text-anchor="middle" fill="#dffbff">No provenance</text><rect x="118" y="-172" width="190" height="48" rx="18" fill="rgba(250,204,21,.16)" stroke="#facc15"/><text x="213" y="-141" text-anchor="middle" fill="#fff4bd">No uncertainty</text><rect x="-306" y="128" width="202" height="48" rx="18" fill="rgba(250,204,21,.16)" stroke="#facc15"/><text x="-205" y="159" text-anchor="middle" fill="#fff4bd">No recency</text><rect x="112" y="128" width="202" height="48" rx="18" fill="rgba(255,139,209,.16)" stroke="#ff8bd1"/><text x="213" y="159" text-anchor="middle" fill="#ffe0f4">No redress</text><rect x="-98" y="-238" width="196" height="48" rx="18" fill="rgba(192,132,252,.16)" stroke="#c084fc"/><text x="0" y="-207" text-anchor="middle" fill="#ecd7ff">No jurisdiction</text></g><g stroke="#fff" stroke-width="2" opacity=".35"><path d="M-106-148L-42-38"/><path d="M120-148L42-38"/><path d="M-104 150L-42 38"/><path d="M110 150L42 38"/><path d="M0-190V-42"/></g></g>
